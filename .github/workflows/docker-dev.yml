name: docker-dev-image

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  docker_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Generate Build Metadata
        run: |
          echo "VERSION=dev" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.IMAGE_NAME }}:dev-amd64
            ${{ env.IMAGE_NAME }}:dev-${{ env.COMMIT }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Generate Build Metadata
        run: |
          echo "VERSION=dev" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.IMAGE_NAME }}:dev-arm64
            ${{ env.IMAGE_NAME }}:dev-${{ env.COMMIT }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker_manifest:
    runs-on: ubuntu-latest
    needs:
      - docker_amd64
      - docker_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Generate Build Metadata
        run: |
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV

      - name: Create and push multi-arch manifests
        run: |
          docker buildx imagetools create \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            "${{ env.IMAGE_NAME }}:dev-amd64" \
            "${{ env.IMAGE_NAME }}:dev-arm64"
          docker buildx imagetools create \
            --tag "${{ env.IMAGE_NAME }}:dev" \
            "${{ env.IMAGE_NAME }}:dev-amd64" \
            "${{ env.IMAGE_NAME }}:dev-arm64"
          docker buildx imagetools create \
            --tag "${{ env.IMAGE_NAME }}:dev-${{ env.COMMIT }}" \
            "${{ env.IMAGE_NAME }}:dev-amd64" \
            "${{ env.IMAGE_NAME }}:dev-arm64"
